<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="PingFang SC, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="#f8fafc" rx="12"/>
  <text x="400" y="32" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e293b">wraplab-client 页面流转图</text>

  <!-- Login -->
  <rect x="50" y="60" width="140" height="45" rx="8" fill="#3b82f6"/>
  <text x="120" y="78" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">登录页</text>
  <text x="120" y="95" text-anchor="middle" font-size="10" fill="#bfdbfe">/pages/login/index</text>

  <line x1="120" y1="105" x2="120" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="130" y="128" text-anchor="middle" font-size="10" fill="#64748b">登录成功</text>

  <!-- Home -->
  <rect x="50" y="145" width="140" height="45" rx="8" fill="#2563eb"/>
  <text x="120" y="163" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">🏠 首页</text>
  <text x="120" y="180" text-anchor="middle" font-size="10" fill="#bfdbfe">/pages/home/index</text>

  <!-- Home → Car Select -->
  <line x1="190" y1="167" x2="240" y2="167" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="215" y="160" text-anchor="middle" font-size="10" fill="#64748b">选车</text>

  <!-- Car Select -->
  <rect x="245" y="100" width="160" height="45" rx="8" fill="#10b981"/>
  <text x="325" y="118" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">🚗 车型选择</text>
  <text x="325" y="135" text-anchor="middle" font-size="10" fill="#a7f3d0">品牌→车系→年款/型号</text>

  <!-- Car Select → Design -->
  <line x1="405" y1="122" x2="460" y2="122" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="432" y="115" text-anchor="middle" font-size="10" fill="#64748b">选定</text>

  <!-- Design -->
  <rect x="465" y="60" width="180" height="55" rx="8" fill="#8b5cf6"/>
  <text x="555" y="80" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">🎨 改色工作台</text>
  <text x="555" y="97" text-anchor="middle" font-size="10" fill="#ddd6fe">/pages/design/index</text>
  <text x="555" y="110" text-anchor="middle" font-size="9" fill="#ddd6fe">+ WebView (Three.js)</text>

  <!-- Design → Quote -->
  <line x1="555" y1="115" x2="555" y2="175" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="150" text-anchor="middle" font-size="10" fill="#64748b">生成报价</text>

  <!-- Quote -->
  <rect x="465" y="180" width="180" height="45" rx="8" fill="#f59e0b"/>
  <text x="555" y="198" text-anchor="middle" font-size="12" fill="#fff" font-weight="bold">📄 报价单</text>
  <text x="555" y="215" text-anchor="middle" font-size="10" fill="#fef3c7">/pages/quote/index</text>

  <!-- Quote → CS -->
  <line x1="555" y1="225" x2="555" y2="265" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="565" y="250" text-anchor="middle" font-size="10" fill="#64748b">联系客服</text>

  <!-- Customer Service -->
  <rect x="465" y="270" width="180" height="40" rx="20" fill="#1e293b"/>
  <text x="555" y="295" text-anchor="middle" font-size="13" fill="#fff" font-weight="bold">📞 客服对话/拨号</text>

  <!-- Home → Design shortcut -->
  <path d="M120,190 L120,230 L555,230 L555,225" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="340" y="225" text-anchor="middle" font-size="9" fill="#94a3b8">继续设计</text>

  <!-- Car Select ← Design back -->
  <path d="M460,140 L420,140" fill="none" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="135" text-anchor="middle" font-size="9" fill="#cbd5e1">换车型</text>

  <!-- Quote → Design back -->
  <path d="M465,202 L420,202 L420,120 L460,120" fill="none" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="440" y="165" text-anchor="middle" font-size="9" fill="#cbd5e1">修改方案</text>

  <!-- Home Back -->
  <path d="M465,210 L350,210 L350,300 L120,300 L120,195" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="240" y="295" text-anchor="middle" font-size="9" fill="#cbd5e1">返回首页</text>

  <!-- Legend box -->
  <rect x="40" y="350" width="720" height="120" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="375" font-size="13" font-weight="bold" fill="#1e293b">页面构成</text>

  <rect x="60" y="390" width="130" height="55" rx="6" fill="#f1f5f9"/>
  <text x="125" y="408" text-anchor="middle" font-size="11" fill="#475569">5 个主页面</text>
  <text x="125" y="425" text-anchor="middle" font-size="10" fill="#64748b">登录→首页→选车</text>
  <text x="125" y="438" text-anchor="middle" font-size="10" fill="#64748b">→改色→报价</text>

  <rect x="210" y="390" width="130" height="55" rx="6" fill="#f0fdf4"/>
  <text x="275" y="408" text-anchor="middle" font-size="11" fill="#166534">核心页面</text>
  <text x="275" y="425" text-anchor="middle" font-size="10" fill="#166534">🎨 改色工作台</text>
  <text x="275" y="438" text-anchor="middle" font-size="10" fill="#166534">3D 预览+色卡+材质</text>

  <rect x="360" y="390" width="180" height="55" rx="6" fill="#f0f9ff"/>
  <text x="450" y="408" text-anchor="middle" font-size="11" fill="#1e40af">跳转关系</text>
  <text x="450" y="425" text-anchor="middle" font-size="10" fill="#1e40af">实线：主流程（正向）</text>
  <text x="450" y="438" text-anchor="middle" font-size="10" fill="#1e40af">虚线：返回/修改</text>

  <rect x="560" y="390" width="180" height="55" rx="6" fill="#faf5ff"/>
  <text x="650" y="408" text-anchor="middle" font-size="11" fill="#5b21b6">外部集成</text>
  <text x="650" y="425" text-anchor="middle" font-size="10" fill="#5b21b6">WebView 内嵌</text>
  <text x="650" y="438" text-anchor="middle" font-size="10" fill="#5b21b6">Three.js H5 页面</text>
</svg>
