<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WrapLab AR Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    #ar-canvas { width: 100%; height: 100%; display: block; }
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.8); z-index: 100; color: #fff;
    }
    #loading-spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 16px; margin-top: 16px; }
    #unsupported-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: #16213E; z-index: 100; color: #fff;
    }
    #unsupported-title { font-size: 20px; font-weight: 600; margin-top: 16px; }
    #unsupported-message { font-size: 14px; opacity: 0.6; margin-top: 8px; text-align: center; padding: 0 32px; }
  </style>
</head>
<body>
  <canvas id="ar-canvas"></canvas>
  <div id="loading-overlay">
    <div id="loading-spinner"></div>
    <div id="loading-text">正在初始化 AR...</div>
  </div>
  <div id="unsupported-overlay">
    <div style="font-size:48px;">📱</div>
    <div id="unsupported-title">AR 功能不可用</div>
    <div id="unsupported-message">您的设备或浏览器不支持 WebXR AR</div>
  </div>
  <!-- NOTE: Build pipeline must resolve .ts → .js for production WebView. The dev server handles .ts natively. -->
  <script type="module" src="./main.ts"></script>
</body>
</html>
